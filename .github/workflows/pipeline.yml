name: Validating Tests and Build Docker

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
    inputs:
      version:
        description: 'Versão da imagem Docker (ex: 1.0, 1.1, 2.0)'
        required: true
        default: '1.0'

jobs:
  tests:
    runs-on: ubuntu-latest
    environment:
      name: development

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: familia_connect
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run tests with Maven
        env:
          DB_URL: ${{ secrets.DB_URL }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_TYPE_DDL: ${{ vars.DB_TYPE_DDL }}
        run: mvn -B -q clean test

  docker:
    runs-on: ubuntu-latest
    needs: tests
    if: github.event_name == 'workflow_dispatch'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker image
        run: |
          VERSION=${{ github.event.inputs.version }}
          echo "Building image with tag ${VERSION}"
          docker build -t fsfernando072/familia-connect-back:${VERSION} .
          docker push fsfernando072/familia-connect-back:${VERSION}
          docker tag fsfernando072/familia-connect-back:${VERSION} fsfernando072/familia-connect-back:latest
          docker push fsfernando072/familia-connect-back:latest