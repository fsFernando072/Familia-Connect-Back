spring.application.name=exemplo-relacionamento

spring.datasource.url=${DB_URL}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=${DB_TYPE_DDL}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true

server.error.include-message=always
server.error.include-binding-errors=always

# validade do token (em segundos)
jwt.validity=3600

# segredo do token via variavel de ambiente (minimo 32 caracteres)
jwt.secret=${JWT_SECRET:dev-insecure-secret-change-me-in-production-min32chars}
jwt.issuer=exemplo-jwt-api
jwt.audience=exemplo-jwt-client