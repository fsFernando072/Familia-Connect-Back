spring.application.name=exemplo-relacionamento

spring.datasource.url=${DB_URL}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=${DB_TYPE_DDL}
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.defer-datasource-initialization=true

server.error.include-message=always
server.error.include-binding-errors=always

# segredo do token via variavel de ambiente (minimo 32 caracteres)
jwt.issuer=exemplo-jwt-api
jwt.audience=exemplo-jwt-client

jwt.secret=YjE1OWE3Yzk5ZDNmNmU5ZDQyMGU4ZGRmZGI5MjEzYzljOTlkM2Y2ZTlkNDIwZThkZGZkYjkyMTNjOWM5OWQzZjZlOWQ0MjBlOGRkZmRiOTIxM2M5Yzk5ZDNmNmU5ZDQyMGU4ZGRmZGI5MjEzYzljOTk=
jwt.validity=3600

# Ordena os endpoints dentro de cada grupo (ex: GET, POST, PUT, DELETE em ordem alfabética)
springdoc.swagger-ui.operationsSorter=alpha

# Ordena os grupos (Tags) alfabeticamente (ex: Acessos, Estados, Funcionários, Permissões)
springdoc.swagger-ui.tagsSorter=alpha